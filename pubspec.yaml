name: smart_resume_tracker
description: "A Smart Resume Builder & Job Application Tracker App"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  # Provides robust and scalable state management.
  flutter_riverpod: ^2.6.1

  # --- Local Storage (Offline functionality) ---
  # Fast, lightweight key-value database for offline storage.
  hive: ^2.2.3
  # Extensions for Hive specifically for Flutter.
  hive_flutter: ^1.1.0

  # --- Utilities ---
  # Generates unique identifiers (used for Application IDs & Resume IDs).
  uuid: ^4.5.1
  # Provides date formatting and internationalization.
  intl: ^0.20.1
  # Checks internet connectivity for sync functionality.
  connectivity_plus: ^6.1.1

  # --- Navigation ---
  # Declarative routing package for Flutter, suitable for complex navigation.
  go_router: ^14.6.2

  # --- UI & Visualization ---
  # Library for drawing charts (used in Application Dashboard).
  fl_chart: ^0.70.0
  # Pre-packaged, beautiful animations for Flutter widgets.
  flutter_animate: ^4.5.2

  # --- Form Building & Validation ---
  # Simplifies form creation, managing state, and validation.
  flutter_form_builder: any
  # Provides ready-made validation rules for flutter_form_builder.
  form_builder_validators: any

  # --- Backend (Firebase) ---
  # Core Firebase plugin for initialization.
  firebase_core: ^3.10.0
  # Cloud Firestore plugin for cloud database synchronization.
  cloud_firestore: ^5.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # --- Code Generation ---
  # Tool for running code generators in Dart.
  build_runner: ^2.4.13
  # Generates TypeAdapters for Hive to store custom objects.
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
